<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minecraft AR - Controller</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { 
      width: 100%; height: 100%; overflow: hidden;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
      font-family: 'Press Start 2P', monospace;
      touch-action: none;
    }
    
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    
    #header { text-align: center; margin-bottom: 20px; }
    #header h1 { color: #50C878; font-size: 20px; text-shadow: 3px 3px 0 #3DA066; margin-bottom: 15px; }
    
    #score-box {
      background: rgba(0,0,0,0.8);
      border: 4px solid #7D7D7D; border-radius: 8px;
      padding: 12px 25px; display: inline-block;
    }
    #score-box .label { color: #888; font-size: 10px; display: block; margin-bottom: 5px; }
    #score { color: #FFD700; font-size: 28px; text-shadow: 2px 2px 0 #000; }
    
    #status { color: #50C878; font-size: 10px; margin-bottom: 20px; padding: 8px 15px; background: rgba(0,0,0,0.5); border-radius: 4px; }
    #status.error { color: #ff4444; }
    
    #mine-btn {
      flex: 1; width: 100%; max-width: 300px;
      background: linear-gradient(180deg, #50C878 0%, #3DA066 100%);
      border: 6px solid #2D7A4E; border-radius: 20px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 15px;
      box-shadow: 0 8px 0 #1D4D32, 0 10px 20px rgba(0,0,0,0.4);
      transition: all 0.1s; margin: 20px 0;
    }
    #mine-btn:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 2px 0 #1D4D32, 0 4px 10px rgba(0,0,0,0.4); }
    #mine-btn:disabled { background: linear-gradient(180deg, #666 0%, #555 100%); border-color: #444; box-shadow: 0 4px 0 #333; cursor: not-allowed; }
    
    #mine-btn .icon { font-size: 60px; }
    #mine-btn .text { color: #fff; font-size: 14px; text-shadow: 2px 2px 0 #000; }
    #mine-btn:active:not(:disabled) .icon { animation: pickaxe 0.2s ease-in-out; }
    
    @keyframes pickaxe { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-20deg); } }
    
    #players { color: #888; font-size: 10px; margin-top: auto; }
    
    .combo-popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #FFD700; font-size: 24px; text-shadow: 3px 3px 0 #000;
      animation: comboShow 0.5s ease-out forwards; pointer-events: none; z-index: 100;
    }
    @keyframes comboShow {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }
    
    .tap-effect {
      position: fixed; width: 80px; height: 80px;
      border: 4px solid #50C878; border-radius: 50%;
      pointer-events: none; animation: tapRipple 0.3s ease-out forwards;
    }
    @keyframes tapRipple {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>⛏️ MINECRAFT</h1>
      <div id="score-box">
        <span class="label">SCORE</span>
        <span id="score">0</span>
      </div>
    </div>
    
    <div id="status">Подключение...</div>
    
    <button id="mine-btn" disabled>
      <span class="icon">⛏️</span>
      <span class="text">TAP TO MINE</span>
    </button>
    
    <div id="players"><span>Игроки: <span id="player-count">0</span></span></div>
  </div>
  
  <script>
    const SERVER_URL = 'http://localhost:3001';
    
    class PhoneController {
      constructor() {
        this.socket = null;
        this.lastTap = 0;
        this.combo = 0;
        this.init();
      }
      
      init() {
        this.socket = io(SERVER_URL, { transports: ['websocket', 'polling'] });
        
        this.socket.on('connect', () => {
          this.updateStatus('Подключено!', false);
          this.socket.emit('identify', { type: 'phone', name: 'Player' });
          document.getElementById('mine-btn').disabled = false;
        });
        
        this.socket.on('disconnect', () => {
          this.updateStatus('Отключено!', true);
          document.getElementById('mine-btn').disabled = true;
        });
        
        this.socket.on('update_score', (data) => {
          document.getElementById('score').textContent = data.score;
          if (data.combo && data.combo >= 2) this.showCombo(data.combo);
        });
        
        this.socket.on('update_health', (data) => {
          if (data.health <= 0) this.updateStatus('ИГРА ОКОНЧЕНА!', true);
        });
        
        document.getElementById('mine-btn').addEventListener('click', () => this.mine());
        document.getElementById('mine-btn').addEventListener('touchstart', (e) => {
          e.preventDefault();
          this.mine();
        }, { passive: false });
      }
      
      mine() {
        const now = Date.now();
        this.combo = (now - this.lastTap < 800) ? this.combo + 1 : 1;
        this.lastTap = now;
        
        this.socket.emit('BREAK_BLOCK', {});
        this.vibrate(50);
        this.showTapEffect();
      }
      
      vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
      
      showTapEffect() {
        const btn = document.getElementById('mine-btn');
        const rect = btn.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;
        
        const effect = document.createElement('div');
        effect.className = 'tap-effect';
        effect.style.left = x + 'px';
        effect.style.top = y + 'px';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 300);
      }
      
      showCombo(combo) {
        const popup = document.createElement('div');
        popup.className = 'combo-popup';
        popup.textContent = 'COMBO x' + combo + '!';
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 500);
      }
      
      updateStatus(text, isError) {
        const el = document.getElementById('status');
        el.textContent = text;
        el.className = isError ? 'error' : '';
      }
    }
    
    new PhoneController();
  </script>
</body>
</html>

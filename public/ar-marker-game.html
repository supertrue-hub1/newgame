<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft AR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #000;
            touch-action: none;
        }
        
        /* Minecraft Pixel Background */
        #minecraft-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* Sky gradient */
        .sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, 
                #5B97DB 0%, 
                #6BA3E0 20%, 
                #87B5E0 40%, 
                #A8D0E8 60%,
                #7CBA5F 70%,
                #5D8C3E 85%,
                #4A7030 100%
            );
        }
        
        /* Clouds */
        .cloud {
            position: absolute;
            background: rgba(255,255,255,0.9);
            border-radius: 10px;
            image-rendering: pixelated;
        }
        
        /* Sun */
        .sun {
            position: absolute;
            top: 8%;
            right: 15%;
            width: 60px;
            height: 60px;
            background: #FFE135;
            border-radius: 50%;
            box-shadow: 0 0 30px #FFE135;
        }
        
        /* Mountains */
        .mountain {
            position: absolute;
            bottom: 30%;
            width: 0;
            height: 0;
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            border-bottom: 120px solid #6B7B6B;
        }
        
        .mountain::after {
            content: '';
            position: absolute;
            top: 30px;
            left: -30px;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 40px solid #fff;
        }
        
        /* Hills */
        .hill {
            position: absolute;
            bottom: 15%;
            width: 150px;
            height: 60px;
            background: #5D8C3E;
            border-radius: 50% 50% 0 0;
        }
        
        /* Grass/Dirt layers */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 15%;
            background: linear-gradient(180deg,
                #5D8C3E 0%,
                #5D8C3E 20%,
                #8B5A2B 20%,
                #8B5A2B 100%
            );
        }
        
        /* Grass blocks pattern */
        .ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 20%;
            background: repeating-linear-gradient(
                90deg,
                #5D8C3E 0px,
                #5D8C3E 15px,
                #4A7030 15px,
                #4A7030 30px
            );
        }
        
        /* Trees */
        .tree {
            position: absolute;
            bottom: 15%;
        }
        
        .tree-trunk {
            width: 20px;
            height: 60px;
            background: repeating-linear-gradient(
                90deg,
                #6B4423 0px,
                #6B4423 10px,
                #5D3A1A 10px,
                #5D3A1A 20px
            );
            margin: 0 auto;
        }
        
        .tree-leaves {
            width: 60px;
            height: 50px;
            background: #2D5A27;
            margin-left: -20px;
            border-radius: 5px;
            position: relative;
        }
        
        .tree-leaves::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 10px;
            width: 40px;
            height: 30px;
            background: #2D5A27;
            border-radius: 5px;
        }
        
        /* Game Container */
        #game {
            position: fixed;
            inset: 0;
            z-index: 10;
        }
        
        /* UI */
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        
        #score-box {
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #7D7D7D;
            border-radius: 8px;
            padding: 8px 20px;
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
            display: none;
            text-align: center;
            font-family: 'Press Start 2D', monospace;
            image-rendering: pixelated;
        }
        
        #combo {
            font-size: 12px;
            color: #FF0000;
            display: block;
            opacity: 0;
            transition: opacity 0.2s;
            font-family: 'Press Start 2D', monospace;
        }
        
        #combo.show {
            opacity: 1;
        }
        
        /* Blocks */
        .block {
            position: absolute;
            width: 65px;
            height: 65px;
            cursor: pointer;
            transition: transform 0.05s;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .block:active {
            transform: scale(0.85);
        }
        
        /* Minecraft Block Textures */
        .block-dirt {
            background: 
                repeating-linear-gradient(0deg, #8B5A2B 0px, #8B5A2B 8px, #7A4E23 8px, #7A4E23 16px),
                repeating-linear-gradient(90deg, #8B5A2B 0px, #8B5A2B 8px, #7A4E23 8px, #7A4E23 16px);
            border: 4px solid #5D3A1A;
        }
        
        .block-grass {
            background: linear-gradient(180deg, 
                #5D8C3E 0%, 
                #5D8C3E 25%, 
                #8B5A2B 25%, 
                #8B5A2B 100%
            );
            border: 4px solid #3D5C2E;
        }
        
        .block-grass-top {
            background: 
                repeating-linear-gradient(90deg, #5D8C3E 0px, #5D8C3E 6px, #4A7030 6px, #4A7030 12px),
                repeating-linear-gradient(0deg, #5D8C3E 0px, #5D8C3E 6px, #4A7030 6px, #4A7030 12px);
        }
        
        .block-stone {
            background: 
                repeating-linear-gradient(45deg, #9E9E9E 0px, #9E9E9E 8px, #8E8E8E 8px, #8E8E8E 16px),
                repeating-linear-gradient(-45deg, #9E9E9E 0px, #9E9E9E 8px, #8E8E8E 8px, #8E8E8E 16px);
            border: 4px solid #5E5E5E;
        }
        
        .block-wood {
            background: repeating-linear-gradient(
                90deg,
                #8B4513 0px,
                #8B4513 12px,
                #6B3510 12px,
                #6B3510 24px
            );
            border: 4px solid #4A2508;
        }
        
        .block-wood-side {
            background: 
                repeating-linear-gradient(0deg, #8B4513 0px, #8B4513 10px, #6B3510 10px, #6B3510 20px),
                linear-gradient(90deg, transparent 40%, #4A2508 40%, #4A2508 60%, transparent 60%);
            border: 4px solid #4A2508;
        }
        
        .block-gold {
            background: 
                repeating-linear-gradient(45deg, #FFD700 0px, #FFD700 5px, #FFC800 5px, #FFC800 10px),
                repeating-linear-gradient(-45deg, #FFD700 0px, #FFD700 5px, #FFC800 5px, #FFC800 10px);
            border: 4px solid #CC8400;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.5);
        }
        
        .block-diamond {
            background: linear-gradient(135deg, #4AEDD9 0%, #3AD9C9 25%, #4AEDD9 50%, #2ECDC1 75%, #4AEDD9 100%);
            border: 4px solid #2A9D8F;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.6);
            position: relative;
        }
        
        .block-diamond::after {
            content: '◆';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px;
            color: rgba(255,255,255,0.7);
        }
        
        .block-redstone {
            background: #6B0000;
            border: 4px solid #4A0000;
            position: relative;
        }
        
        .block-redstone::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 10%;
            right: 10%;
            height: 4px;
            background: #FF0000;
            box-shadow: 0 -12px 0 #FF0000, 0 12px 0 #FF0000;
        }
        
        .block-redstone::after {
            content: '';
            position: absolute;
            bottom: 20%;
            left: 20%;
            width: 60%;
            height: 4px;
            background: #FF0000;
        }
        
        .block-emerald {
            background: linear-gradient(135deg, #50C878 0%, #3AB56F 50%, #50C878 100%);
            border: 4px solid #1D5D3A;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.4);
            position: relative;
        }
        
        .block-emerald::after {
            content: '●';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: rgba(255,255,255,0.6);
        }
        
        .block-obsidian {
            background: #1a0a2e;
            border: 4px solid #0d0518;
            position: relative;
        }
        
        .block-obsidian::before {
            content: '';
            position: absolute;
            inset: 5px;
            border: 2px solid rgba(100,50,150,0.5);
        }
        
        /* Start Screen */
        #start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        #start-screen.hidden {
            display: none;
        }
        
        /* Minecraft-style title */
        .mc-title {
            font-family: 'Press Start 2D', 'Courier New', monospace;
            font-size: 32px;
            color: #50C878;
            text-shadow: 
                4px 4px 0 #3DA066,
                -1px -1px 0 #5D8C3E;
            margin-bottom: 5px;
            image-rendering: pixelated;
        }
        
        .mc-subtitle {
            font-family: 'Press Start 2D', monospace;
            font-size: 14px;
            color: #FFD700;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #000;
        }
        
        #start-btn {
            background: linear-gradient(180deg, #7D7D7D 0%, #5D5D5D 50%, #4D4D4D 100%);
            border: 4px solid #3D3D3D;
            border-bottom-color: #2D2D2D;
            border-radius: 4px;
            padding: 18px 45px;
            font-family: 'Press Start 2D', monospace;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 6px 0 #2D2D2D;
            transition: all 0.1s;
        }
        
        #start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2D2D2D;
        }
        
        #start-screen .info {
            color: #888;
            margin-top: 25px;
            text-align: center;
            line-height: 2;
            font-size: 13px;
            font-family: 'Press Start 2D', monospace;
        }
        
        #start-screen .info span {
            color: #50C878;
        }
        
        /* Win Modal */
        #win-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        
        #win-modal.show {
            display: flex;
        }
        
        #win-content {
            background: linear-gradient(180deg, #3D3D3D 0%, #2D2D2D 100%);
            border: 5px solid #7D7D7D;
            border-radius: 8px;
            padding: 30px 40px;
            text-align: center;
        }
        
        #win-content h2 {
            font-family: 'Press Start 2D', monospace;
            color: #FFD700;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #000;
        }
        
        #win-content .score {
            font-family: 'Press Start 2D', monospace;
            color: #50C878;
            font-size: 36px;
            text-shadow: 2px 2px 0 #000;
        }
        
        #win-content .promo-label {
            color: #888;
            font-size: 10px;
            margin-top: 15px;
            font-family: 'Press Start 2D', monospace;
        }
        
        #win-content .promo {
            color: #50C878;
            font-size: 18px;
            font-family: 'Press Start 2D', monospace;
            background: #1a1a2e;
            padding: 12px 20px;
            border-radius: 4px;
            margin: 10px 0;
            border: 3px dashed #50C878;
        }
        
        #play-again {
            background: linear-gradient(180deg, #50C878 0%, #3DA066 100%);
            border: 4px solid #2D7A4E;
            border-radius: 4px;
            padding: 15px 30px;
            font-family: 'Press Start 2D', monospace;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            margin-top: 15px;
            text-shadow: 2px 2px 0 #000;
        }
        
        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 50;
            image-rendering: pixelated;
        }
        
        /* Status */
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 12px 20px;
            border-radius: 4px;
            font-family: 'Press Start 2D', monospace;
            font-size: 12px;
            z-index: 100;
            border: 3px solid #7D7D7D;
        }
        
        /* Back button */
        #back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: #7D7D7D;
            border: 3px solid #3D3D3D;
            color: #fff;
            padding: 10px 15px;
            border-radius: 4px;
            z-index: 150;
            text-decoration: none;
            font-family: 'Press Start 2D', monospace;
            font-size: 10px;
            display: none;
        }
        
        /* Block spawn indicator */
        @keyframes blockAppear {
            0% { transform: scale(0) rotate(-180deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        
        .block.new {
            animation: blockAppear 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- Minecraft Background -->
    <div id="minecraft-bg">
        <div class="sky"></div>
        <div class="sun"></div>
        
        <!-- Clouds -->
        <div class="cloud" style="top: 10%; left: 10%; width: 80px; height: 30px;"></div>
        <div class="cloud" style="top: 15%; left: 50%; width: 100px; height: 35px;"></div>
        <div class="cloud" style="top: 8%; left: 75%; width: 70px; height: 25px;"></div>
        
        <!-- Mountains -->
        <div class="mountain" style="left: 5%;"></div>
        <div class="mountain" style="left: 15%; border-bottom-width: 80px; border-left-width: 60px; border-right-width: 60px;"></div>
        <div class="mountain" style="left: 70%; border-bottom-width: 100px;"></div>
        <div class="mountain" style="left: 82%; border-bottom-width: 60px; border-left-width: 50px; border-right-width: 50px;"></div>
        
        <!-- Hills -->
        <div class="hill" style="left: 0%;"></div>
        <div class="hill" style="left: 25%; transform: scale(1.2);"></div>
        <div class="hill" style="left: 60%;"></div>
        <div class="hill" style="left: 80%; transform: scale(0.8);"></div>
        
        <!-- Trees -->
        <div class="tree" style="left: 8%;">
            <div class="tree-leaves"></div>
            <div class="tree-trunk"></div>
        </div>
        <div class="tree" style="left: 35%;">
            <div class="tree-leaves"></div>
            <div class="tree-trunk"></div>
        </div>
        <div class="tree" style="left: 55%;">
            <div class="tree-leaves"></div>
            <div class="tree-trunk"></div>
        </div>
        <div class="tree" style="left: 88%;">
            <div class="tree-leaves"></div>
            <div class="tree-trunk"></div>
        </div>
        
        <!-- Ground -->
        <div class="ground"></div>
    </div>
    
    <!-- Back -->
    <a href="/ar" id="back-btn">← НАЗАД</a>
    
    <!-- Game -->
    <div id="game">
        <div id="ui">
            <div id="score-box">
                <span id="score">0</span>
                <span id="combo">COMBO x2!</span>
            </div>
        </div>
        <div id="status" style="display:none;">👆 TAP BLOCKS!</div>
    </div>
    
    <!-- Start Screen -->
    <div id="start-screen">
        <h1 class="mc-title">MINECRAFT</h1>
        <p class="mc-subtitle">BLOCK TAP</p>
        <button id="start-btn">🎮 ИГРАТЬ</button>
        <div class="info">
            <p>👆 <span>TAP</span> ПО БЛОКАМ</p>
            <p>🏆 НАБЕРИ <span>10 ОЧКОВ</span></p>
        </div>
    </div>
    
    <!-- Win Modal -->
    <div id="win-modal">
        <div id="win-content">
            <h2>🎉 ПОБЕДА!</h2>
            <p>СЧЁТ:</p>
            <div class="score"><span id="final-score">0</span></div>
            <p class="promo-label">ПРОМОКОД:</p>
            <div class="promo">MINECRAFT-AR</div>
            <p style="font-size:10px;color:#666;margin-top:5px;">СКИДКА 20%</p>
            <button id="play-again">🔄 ЕЩЁ РАЗ</button>
        </div>
    </div>
    
    <script>
        // ============ GAME STATE ============
        const state = {
            score: 0,
            playing: false,
            won: false,
            blocks: [],
            combo: 0,
            lastTap: 0
        };
        
        const BLOCK_TYPES = [
            { name: 'dirt', class: 'block-dirt', points: 1, speed: 2 },
            { name: 'grass', class: 'block-grass', points: 1, speed: 2 },
            { name: 'stone', class: 'block-stone', points: 1, speed: 2.5 },
            { name: 'wood', class: 'block-wood-side', points: 1, speed: 2 },
            { name: 'gold', class: 'block-gold', points: 3, speed: 3.5 },
            { name: 'diamond', class: 'block-diamond', points: 5, speed: 4 },
            { name: 'redstone', class: 'block-redstone', points: 2, speed: 3 },
            { name: 'emerald', class: 'block-emerald', points: 4, speed: 3.5 },
            { name: 'obsidian', class: 'block-obsidian', points: 6, speed: 5 }
        ];
        
        const $ = id => document.getElementById(id);
        
        // ============ AUDIO ============
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'pop') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'win') {
                    [523, 659, 784, 1047].forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'square';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.12);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.2);
                        o.start(audioCtx.currentTime + i * 0.12);
                        o.stop(audioCtx.currentTime + i * 0.12 + 0.25);
                    });
                }
            } catch(e) {}
        }
        
        // ============ PARTICLES ============
        function createParticles(x, y, blockClass) {
            const colors = {
                'block-dirt': '#8B5A2B',
                'block-grass': '#5D8C3E',
                'block-stone': '#9E9E9E',
                'block-wood-side': '#8B4513',
                'block-gold': '#FFD700',
                'block-diamond': '#4AEDD9',
                'block-redstone': '#FF0000',
                'block-emerald': '#50C878',
                'block-obsidian': '#1a0a2e'
            };
            
            const color = colors[blockClass] || '#fff';
            
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `
                    left: ${x}px;
                    top: ${y}px;
                    width: 10px;
                    height: 10px;
                    background: ${color};
                    border: 2px solid rgba(0,0,0,0.3);
                `;
                document.body.appendChild(p);
                
                const angle = (Math.PI * 2 / 10) * i;
                let vx = Math.cos(angle) * 120;
                let vy = Math.sin(angle) * 120 - 60;
                let px = x, py = y, op = 1;
                
                const animate = () => {
                    vy += 8;
                    px += vx * 0.02;
                    py += vy * 0.02;
                    op -= 0.035;
                    p.style.cssText = `
                        left: ${px}px;
                        top: ${py}px;
                        width: 10px;
                        height: 10px;
                        background: ${color};
                        border: 2px solid rgba(0,0,0,0.3);
                        opacity: ${op};
                        pointer-events: none;
                    `;
                    if (op > 0) requestAnimationFrame(animate);
                    else p.remove();
                };
                requestAnimationFrame(animate);
            }
        }
        
        // ============ GAME LOGIC ============
        let blockId = 0;
        let spawnTimer = null;
        let gameLoopTimer = null;
        
        function spawnBlock() {
            if (!state.playing || state.won) return;
            
            const type = BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
            const block = document.createElement('div');
            
            block.className = `block ${type.class} new`;
            block.id = 'block-' + blockId++;
            
            // Random X position
            const maxX = window.innerWidth - 75;
            const x = Math.random() * maxX;
            const y = -70;
            
            block.style.left = x + 'px';
            block.style.top = y + 'px';
            
            // Click handler
            const handleTap = (e) => {
                e.preventDefault();
                e.stopPropagation();
                tapBlock(blockData, e);
            };
            
            block.addEventListener('click', handleTap);
            block.addEventListener('touchstart', handleTap, { passive: false });
            
            $('game').appendChild(block);
            
            // Remove animation class after animation
            setTimeout(() => block.classList.remove('new'), 300);
            
            const blockData = {
                el: block,
                y: y,
                x: x,
                speed: type.speed + Math.random() * 0.5,
                type: type,
                caught: false
            };
            
            state.blocks.push(blockData);
        }
        
        function tapBlock(data, event) {
            if (data.caught || !state.playing) return;
            data.caught = true;
            
            // Get position
            const rect = data.el.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createParticles(x, y, data.type.class);
            playSound('pop');
            
            // Combo
            const now = Date.now();
            state.combo = (now - state.lastTap < 1000) ? state.combo + 1 : 1;
            state.lastTap = now;
            
            // Points
            const pts = data.type.points * Math.min(state.combo, 5);
            state.score += pts;
            
            $('score').textContent = state.score;
            
            // Combo show
            if (state.combo >= 2) {
                $('combo').textContent = `COMBO x${state.combo}!`;
                $('combo').classList.add('show');
                setTimeout(() => $('combo').classList.remove('show'), 500);
            }
            
            // Remove block
            data.el.style.transform = 'scale(0)';
            data.el.style.transition = 'transform 0.1s';
            setTimeout(() => data.el.remove(), 100);
            
            // Win check
            if (state.score >= 10) {
                win();
            }
        }
        
        function gameLoop() {
            if (!state.playing || state.won) return;
            
            const windowHeight = window.innerHeight;
            
            state.blocks = state.blocks.filter(b => {
                if (b.caught) return false;
                
                b.y += b.speed;
                b.el.style.top = b.y + 'px';
                
                // Rotate while falling
                const currentRotation = parseInt(b.el.dataset.rotation || '0');
                b.el.dataset.rotation = currentRotation + 4;
                b.el.style.transform = `rotate(${currentRotation + 4}deg)`;
                
                // Remove if off screen
                if (b.y > windowHeight) {
                    b.el.remove();
                    return false;
                }
                return true;
            });
            
            gameLoopTimer = requestAnimationFrame(gameLoop);
        }
        
        function start() {
            initAudio();
            
            state.score = 0;
            state.playing = true;
            state.won = false;
            state.blocks = [];
            state.combo = 0;
            
            $('score').textContent = '0';
            $('score-box').style.display = 'block';
            $('start-screen').classList.add('hidden');
            $('status').style.display = 'block';
            $('back-btn').style.display = 'block';
            
            // Start spawning
            spawnBlock();
            spawnTimer = setInterval(spawnBlock, 650);
            gameLoop();
        }
        
        function win() {
            state.won = true;
            state.playing = false;
            clearInterval(spawnTimer);
            cancelAnimationFrame(gameLoopTimer);
            
            playSound('win');
            
            // Remove all blocks
            state.blocks.forEach(b => b.el.remove());
            state.blocks = [];
            
            $('final-score').textContent = state.score;
            $('win-modal').classList.add('show');
        }
        
        function reset() {
            state.won = false;
            state.playing = false;
            $('win-modal').classList.remove('show');
            $('start-screen').classList.remove('hidden');
            $('score-box').style.display = 'none';
            $('status').style.display = 'none';
            $('back-btn').style.display = 'none';
        }
        
        // ============ EVENT LISTENERS ============
        $('start-btn').addEventListener('click', start);
        $('play-again').addEventListener('click', reset);
        
        // Prevent default touch behaviors
        document.addEventListener('touchmove', (e) => {
            if (state.playing) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>

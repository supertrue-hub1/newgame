<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft AR - Тапай блоки!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #000;
            touch-action: none;
        }
        
        /* Camera Video Background */
        #camera-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        /* Game Container */
        #game {
            position: fixed;
            inset: 0;
            z-index: 10;
        }
        
        /* UI */
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            z-index: 100;
            display: flex;
            justify-content: center;
        }
        
        #score-box {
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #50C878;
            border-radius: 12px;
            padding: 10px 25px;
            color: #50C878;
            font-size: 24px;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        
        #combo {
            font-size: 14px;
            color: #FFD700;
            display: block;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        #combo.show {
            opacity: 1;
        }
        
        /* Blocks */
        .block {
            position: absolute;
            width: 70px;
            height: 70px;
            cursor: pointer;
            transition: transform 0.1s;
            image-rendering: pixelated;
        }
        
        .block:active {
            transform: scale(0.9);
        }
        
        /* Minecraft-style block textures (CSS patterns) */
        .block-dirt {
            background: linear-gradient(135deg, #8B5A2B 0%, #6B4423 100%);
            border: 4px solid #5D3A1A;
            box-shadow: inset 3px 3px 0 rgba(255,255,255,0.2), inset -3px -3px 0 rgba(0,0,0,0.3);
        }
        
        .block-grass {
            background: linear-gradient(180deg, #5D8C3E 0%, #5D8C3E 30%, #8B5A2B 30%, #8B5A2B 100%);
            border: 4px solid #3D5C2E;
            box-shadow: inset 3px 3px 0 rgba(255,255,255,0.2);
        }
        
        .block-stone {
            background: linear-gradient(135deg, #9E9E9E 0%, #757575 50%, #9E9E9E 100%);
            border: 4px solid #555;
            box-shadow: inset 3px 3px 0 rgba(255,255,255,0.2), inset -3px -3px 0 rgba(0,0,0,0.2);
        }
        
        .block-wood {
            background: repeating-linear-gradient(
                0deg,
                #8B4513 0px,
                #8B4513 10px,
                #6B3510 10px,
                #6B3510 20px
            );
            border: 4px solid #4A2508;
        }
        
        .block-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            border: 4px solid #CC8400;
            box-shadow: inset 3px 3px 10px rgba(255,255,255,0.5);
            animation: shine 1s infinite;
        }
        
        .block-diamond {
            background: linear-gradient(135deg, #4AEDD9 0%, #00CED1 50%, #4AEDD9 100%);
            border: 4px solid #2A9D8F;
            box-shadow: inset 3px 3px 10px rgba(255,255,255,0.6);
            animation: shine 0.8s infinite;
        }
        
        .block-redstone {
            background: #8B0000;
            border: 4px solid #5C0000;
            position: relative;
        }
        
        .block-redstone::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 4px;
            background: #FF0000;
            box-shadow: 0 -15px 0 #FF0000, 0 15px 0 #FF0000;
        }
        
        .block-emerald {
            background: linear-gradient(135deg, #50C878 0%, #2E8B57 100%);
            border: 4px solid #1D5D3A;
            box-shadow: inset 3px 3px 10px rgba(255,255,255,0.4);
            animation: shine 1.2s infinite;
        }
        
        @keyframes shine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        /* Start Screen */
        #start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        #start-screen.hidden {
            display: none;
        }
        
        #start-screen h1 {
            color: #50C878;
            font-size: 42px;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 5px;
        }
        
        #start-screen .subtitle {
            color: #FFD700;
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        #start-btn {
            background: linear-gradient(180deg, #50C878 0%, #3DA066 100%);
            border: 4px solid #2D7A4E;
            border-radius: 15px;
            padding: 20px 50px;
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 6px 0 #1D4D32, 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }
        
        #start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1D4D32, 0 4px 10px rgba(0,0,0,0.4);
        }
        
        #start-screen .info {
            color: #888;
            margin-top: 25px;
            text-align: center;
            line-height: 1.8;
            font-size: 14px;
        }
        
        #start-screen .info span {
            color: #50C878;
        }
        
        /* Win Modal */
        #win-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        
        #win-modal.show {
            display: flex;
        }
        
        #win-content {
            background: linear-gradient(180deg, #1a1a2e 0%, #2d2d5a 100%);
            border: 5px solid #FFD700;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
        }
        
        #win-content h2 {
            color: #FFD700;
            font-size: 36px;
            margin-bottom: 15px;
        }
        
        #win-content .score {
            color: #50C878;
            font-size: 48px;
            font-weight: bold;
        }
        
        #win-content .promo-label {
            color: #888;
            font-size: 12px;
            margin-top: 15px;
        }
        
        #win-content .promo {
            color: #50C878;
            font-size: 22px;
            background: rgba(80, 200, 120, 0.15);
            padding: 12px 20px;
            border-radius: 8px;
            margin: 10px 0;
            border: 2px dashed #50C878;
            font-family: monospace;
        }
        
        #play-again {
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            border: 4px solid #CC8400;
            border-radius: 12px;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            margin-top: 15px;
        }
        
        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: #0a0a15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            color: #fff;
        }
        
        #loading.hidden {
            display: none;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid #333;
            border-top: 6px solid #50C878;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading p {
            margin-top: 20px;
            font-size: 16px;
            color: #888;
        }
        
        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 50;
        }
        
        /* Status */
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
        }
        
        #back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            z-index: 150;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="loader"></div>
        <p>Загрузка камеры...</p>
    </div>
    
    <!-- Camera -->
    <video id="camera-bg" autoplay playsinline muted></video>
    
    <!-- Back -->
    <a href="/ar" id="back-btn" style="display:none;">← Назад</a>
    
    <!-- Game -->
    <div id="game">
        <div id="ui">
            <div id="score-box">
                <span id="score">0</span>
                <span id="combo">COMBO x2!</span>
            </div>
        </div>
        <div id="status" style="display:none;">👆 Тапай по блокам!</div>
    </div>
    
    <!-- Start Screen -->
    <div id="start-screen" class="hidden">
        <h1>⛏️ MINECRAFT</h1>
        <p class="subtitle">AR</p>
        <button id="start-btn">🎮 ИГРАТЬ</button>
        <div class="info">
            <p>📷 Разреши камеру</p>
            <p>👆 <span>Тапай</span> по блокам</p>
            <p>🏆 Набери <span>10 очков</span> для победы!</p>
        </div>
    </div>
    
    <!-- Win Modal -->
    <div id="win-modal">
        <div id="win-content">
            <h2>🎉 ПОБЕДА!</h2>
            <p>Счёт:</p>
            <div class="score"><span id="final-score">0</span></div>
            <p class="promo-label">Твой промокод:</p>
            <div class="promo">MINECRAFT-AR</div>
            <p style="font-size:11px;color:#666;">Скидка 20%</p>
            <button id="play-again">🔄 Ещё раз</button>
        </div>
    </div>
    
    <script>
        // ============ GAME STATE ============
        const state = {
            score: 0,
            playing: false,
            won: false,
            blocks: [],
            combo: 0,
            lastTap: 0,
            cameraReady: false
        };
        
        const BLOCK_TYPES = [
            { name: 'dirt', class: 'block-dirt', points: 1, speed: 2 },
            { name: 'grass', class: 'block-grass', points: 1, speed: 2 },
            { name: 'stone', class: 'block-stone', points: 1, speed: 2.5 },
            { name: 'wood', class: 'block-wood', points: 1, speed: 2 },
            { name: 'gold', class: 'block-gold', points: 3, speed: 3 },
            { name: 'diamond', class: 'block-diamond', points: 5, speed: 4 },
            { name: 'redstone', class: 'block-redstone', points: 2, speed: 3 },
            { name: 'emerald', class: 'block-emerald', points: 4, speed: 3.5 }
        ];
        
        const $ = id => document.getElementById(id);
        
        // ============ AUDIO ============
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'pop') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'win') {
                    [523, 659, 784, 1047].forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.type = 'square';
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.12);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.2);
                        o.start(audioCtx.currentTime + i * 0.12);
                        o.stop(audioCtx.currentTime + i * 0.12 + 0.25);
                    });
                }
            } catch(e) {}
        }
        
        // ============ PARTICLES ============
        function createParticles(x, y, color) {
            const colors = {
                'block-dirt': '#8B5A2B',
                'block-grass': '#5D8C3E',
                'block-stone': '#9E9E9E',
                'block-wood': '#8B4513',
                'block-gold': '#FFD700',
                'block-diamond': '#4AEDD9',
                'block-redstone': '#FF0000',
                'block-emerald': '#50C878'
            };
            
            const particleColor = colors[color] || '#fff';
            
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `
                    left: ${x}px;
                    top: ${y}px;
                    width: 12px;
                    height: 12px;
                    background: ${particleColor};
                    border-radius: 2px;
                `;
                document.body.appendChild(p);
                
                const angle = (Math.PI * 2 / 12) * i;
                let vx = Math.cos(angle) * 150;
                let vy = Math.sin(angle) * 150 - 80;
                let px = x, py = y, op = 1;
                
                const animate = () => {
                    vy += 10;
                    px += vx * 0.02;
                    py += vy * 0.02;
                    op -= 0.03;
                    p.style.cssText = `
                        left: ${px}px;
                        top: ${py}px;
                        width: 12px;
                        height: 12px;
                        background: ${particleColor};
                        border-radius: 2px;
                        opacity: ${op};
                        pointer-events: none;
                    `;
                    if (op > 0) requestAnimationFrame(animate);
                    else p.remove();
                };
                requestAnimationFrame(animate);
            }
        }
        
        // ============ GAME LOGIC ============
        let blockId = 0;
        let spawnTimer = null;
        let gameLoopTimer = null;
        
        function spawnBlock() {
            if (!state.playing || state.won) return;
            
            const type = BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
            const block = document.createElement('div');
            
            block.className = `block ${type.class}`;
            block.id = 'block-' + blockId++;
            
            // Random X position
            const maxX = window.innerWidth - 80;
            const x = Math.random() * maxX;
            const y = -80;
            
            block.style.left = x + 'px';
            block.style.top = y + 'px';
            
            // Click handler
            const handleTap = (e) => {
                e.preventDefault();
                e.stopPropagation();
                tapBlock(blockData, e);
            };
            
            block.addEventListener('click', handleTap);
            block.addEventListener('touchstart', handleTap, { passive: false });
            
            $('game').appendChild(block);
            
            const blockData = {
                el: block,
                y: y,
                x: x,
                speed: type.speed + Math.random() * 0.5,
                type: type,
                caught: false
            };
            
            state.blocks.push(blockData);
        }
        
        function tapBlock(data, event) {
            if (data.caught || !state.playing) return;
            data.caught = true;
            
            // Get position
            const rect = data.el.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            createParticles(x, y, data.type.class);
            playSound('pop');
            
            // Combo
            const now = Date.now();
            state.combo = (now - state.lastTap < 1000) ? state.combo + 1 : 1;
            state.lastTap = now;
            
            // Points
            const pts = data.type.points * Math.min(state.combo, 5);
            state.score += pts;
            
            $('score').textContent = state.score;
            
            // Combo show
            if (state.combo >= 2) {
                $('combo').textContent = `COMBO x${state.combo}!`;
                $('combo').classList.add('show');
                setTimeout(() => $('combo').classList.remove('show'), 500);
            }
            
            // Remove block
            data.el.style.transform = 'scale(0)';
            data.el.style.transition = 'transform 0.1s';
            setTimeout(() => data.el.remove(), 100);
            
            // Win check
            if (state.score >= 10) {
                win();
            }
        }
        
        function gameLoop() {
            if (!state.playing || state.won) return;
            
            const windowHeight = window.innerHeight;
            
            state.blocks = state.blocks.filter(b => {
                if (b.caught) return false;
                
                b.y += b.speed;
                b.el.style.top = b.y + 'px';
                
                // Rotate while falling
                const currentRotation = parseInt(b.el.dataset.rotation || '0');
                b.el.dataset.rotation = currentRotation + 3;
                b.el.style.transform = `rotate(${currentRotation + 3}deg)`;
                
                // Remove if off screen
                if (b.y > windowHeight) {
                    b.el.remove();
                    return false;
                }
                return true;
            });
            
            gameLoopTimer = requestAnimationFrame(gameLoop);
        }
        
        function start() {
            initAudio();
            
            state.score = 0;
            state.playing = true;
            state.won = false;
            state.blocks = [];
            state.combo = 0;
            
            $('score').textContent = '0';
            $('score-box').style.display = 'block';
            $('start-screen').classList.add('hidden');
            $('status').style.display = 'block';
            $('back-btn').style.display = 'block';
            
            // Start spawning
            spawnBlock();
            spawnTimer = setInterval(spawnBlock, 700);
            gameLoop();
        }
        
        function win() {
            state.won = true;
            state.playing = false;
            clearInterval(spawnTimer);
            cancelAnimationFrame(gameLoopTimer);
            
            playSound('win');
            
            // Remove all blocks
            state.blocks.forEach(b => b.el.remove());
            state.blocks = [];
            
            $('final-score').textContent = state.score;
            $('win-modal').classList.add('show');
        }
        
        function reset() {
            state.won = false;
            state.playing = false;
            $('win-modal').classList.remove('show');
            $('start-screen').classList.remove('hidden');
            $('score-box').style.display = 'none';
            $('status').style.display = 'none';
            $('back-btn').style.display = 'none';
        }
        
        // ============ INIT CAMERA ============
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                const video = $('camera-bg');
                video.srcObject = stream;
                await video.play();
                
                $('loading').classList.add('hidden');
                $('start-screen').classList.remove('hidden');
                state.cameraReady = true;
                
            } catch(err) {
                console.error('Camera error:', err);
                $('loading').innerHTML = `
                    <p style="color:#ff4444;font-size:14px;text-align:center;padding:20px;max-width:300px;">
                        📷 Ошибка камеры:<br><br>
                        ${err.message}<br><br>
                        1. Разреши доступ к камере<br>
                        2. Используй HTTPS<br>
                        3. Обнови страницу
                    </p>
                `;
            }
        }
        
        // ============ EVENT LISTENERS ============
        $('start-btn').addEventListener('click', () => {
            if (!state.cameraReady) {
                alert('Камера ещё загружается...');
                return;
            }
            start();
        });
        
        $('play-again').addEventListener('click', reset);
        
        // Prevent default touch behaviors
        document.addEventListener('touchmove', (e) => {
            if (state.playing) e.preventDefault();
        }, { passive: false });
        
        // Start
        initCamera();
    </script>
</body>
</html>

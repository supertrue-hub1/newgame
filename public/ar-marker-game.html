<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            overflow: hidden; 
            background: #000; 
            font-family: Arial, sans-serif; 
            height: 100%;
        }
        
        #game-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        
        /* UI Overlay */
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            z-index: 100;
            pointer-events: none;
        }
        
        #score {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            border: 3px solid #4ade80;
            border-radius: 15px;
            padding: 12px 25px;
            color: #4ade80;
            font-size: 28px;
            font-weight: bold;
            display: none;
            text-align: center;
        }
        
        #combo {
            font-size: 14px;
            color: #fbbf24;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #fff;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 300;
            text-decoration: none;
            font-size: 14px;
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fbbf24;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
        }
        
        #status.ready { color: #4ade80; }
        
        /* Start Screen */
        #start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        #start-screen.hidden { display: none; }
        
        #start-screen h1 {
            color: #4ade80;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #000;
        }
        
        #start-screen .subtitle {
            color: #fbbf24;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        #start-btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 20px;
            padding: 25px 60px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(74, 222, 128, 0.4);
            transition: transform 0.2s;
        }
        
        #start-btn:active { transform: scale(0.95); }
        
        #start-screen .instructions {
            color: #aaa;
            font-size: 14px;
            margin-top: 30px;
            text-align: center;
            line-height: 1.8;
        }
        
        #start-screen .instructions span {
            color: #4ade80;
        }
        
        /* Win Modal */
        #win-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        
        #win-modal.show { display: flex; }
        
        #win-content {
            background: linear-gradient(135deg, #1a1a2e, #2d2d5a);
            border: 4px solid #fbbf24;
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        #win-content h2 { 
            color: #fbbf24; 
            font-size: 32px; 
            margin-bottom: 20px; 
        }
        
        #win-content .score-final {
            font-size: 48px;
            color: #4ade80;
            font-weight: bold;
        }
        
        #promo {
            color: #4ade80;
            font-size: 24px;
            background: rgba(74, 222, 128, 0.15);
            padding: 15px 25px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            border: 2px dashed #4ade80;
        }
        
        #play-again {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 15px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            margin-top: 15px;
        }
        
        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 150;
        }
        
        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
        }
        
        #loading.hidden { display: none; }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #333;
            border-top: 5px solid #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        #loading p { margin-top: 20px; font-size: 18px; }
        
        /* Block click area */
        #tap-area {
            position: fixed;
            inset: 0;
            z-index: 50;
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Загрузка камеры...</p>
    </div>
    
    <!-- Start Screen -->
    <div id="start-screen">
        <h1>⛏️ MINECRAFT AR</h1>
        <p class="subtitle">Web AR Игра</p>
        
        <button id="start-btn">🎮 ИГРАТЬ</button>
        
        <div class="instructions">
            <p>📷 Разрешите доступ к камере</p>
            <p>👆 <span>Тапайте</span> по блокам чтобы собрать их</p>
            <p>🏆 Наберите <span>10 очков</span> для победы!</p>
        </div>
    </div>
    
    <!-- Back button -->
    <a href="/ar" id="back-btn" style="display:none;">← Назад</a>
    
    <!-- UI -->
    <div id="ui">
        <div id="score">0<div id="combo">COMBO x2!</div></div>
    </div>
    
    <div id="status" style="display:none;">📷 Камера: ожидание...</div>
    
    <!-- Tap area for mobile -->
    <div id="tap-area"></div>
    
    <!-- Win Modal -->
    <div id="win-modal">
        <div id="win-content">
            <h2>🎉 Победа!</h2>
            <p>Ваш счёт:</p>
            <div class="score-final"><span id="final-score">0</span></div>
            <p style="color:#888;font-size:12px;margin-top:10px;">Промокод для скидки:</p>
            <div id="promo">MINECRAFT-AR</div>
            <p style="font-size:11px;color:#666;">Скидка 20% в магазине</p>
            <button id="play-again">🔄 Играть снова</button>
        </div>
    </div>
    
    <!-- A-Frame Scene with camera -->
    <a-scene id="game-scene" vr-mode-ui="enabled:false" embedded style="display:none;">
        <a-entity id="camera-rig">
            <a-camera id="camera" look-controls="enabled:false" wasd-controls="enabled:false"></a-camera>
        </a-entity>
        
        <!-- Game world -->
        <a-entity id="world">
            <!-- Ground -->
            <a-plane position="0 0 -3" rotation="-90 0 0" width="10" height="10" 
                     color="#5D8C3E" opacity="0.8"></a-plane>
            
            <!-- Blocks container -->
            <a-entity id="blocks-container"></a-entity>
        </a-entity>
        
        <!-- Lighting -->
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.5"></a-light>
    </a-scene>
    
    <script>
        const state = {
            score: 0,
            playing: false,
            won: false,
            blocks: [],
            combo: 0,
            lastTap: 0,
            cameraReady: false
        };
        
        const BLOCK_TYPES = [
            { name: 'dirt', color: '#8B5A2B', points: 1 },
            { name: 'grass', color: '#5D8C3E', points: 1 },
            { name: 'stone', color: '#7D7D7D', points: 1 },
            { name: 'wood', color: '#8B4513', points: 1 },
            { name: 'gold', color: '#FFD700', points: 3 },
            { name: 'diamond', color: '#4AEDD9', points: 5 },
            { name: 'redstone', color: '#FF0000', points: 2 },
            { name: 'emerald', color: '#00FF00', points: 4 }
        ];
        
        const $ = id => document.getElementById(id);
        
        // ============ AUDIO ============
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'pop') {
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'win') {
                    [523, 659, 784, 1047].forEach((f, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.value = f;
                        g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.15);
                        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                        o.start(audioCtx.currentTime + i * 0.15);
                        o.stop(audioCtx.currentTime + i * 0.15 + 0.3);
                    });
                }
            } catch(e) {}
        }
        
        // ============ PARTICLES ============
        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                Object.assign(p.style, {
                    left: x + 'px', top: y + 'px',
                    width: '10px', height: '10px',
                    background: color, borderRadius: '3px'
                });
                document.body.appendChild(p);
                const angle = (Math.PI * 2 / 12) * i;
                let vx = Math.cos(angle) * 100, vy = Math.sin(angle) * 100 - 60;
                let px = x, py = y, op = 1;
                const animate = () => {
                    vy += 8;
                    px += vx * 0.02;
                    py += vy * 0.02;
                    op -= 0.025;
                    p.style.cssText = `left:${px}px;top:${py}px;width:10px;height:10px;background:${color};border-radius:3px;opacity:${op};pointer-events:none;`;
                    if (op > 0) requestAnimationFrame(animate);
                    else p.remove();
                };
                requestAnimationFrame(animate);
            }
        }
        
        // ============ GAME LOGIC ============
        let blockCount = 0;
        let spawnTimer = null;
        
        function spawnBlock() {
            if (!state.playing || state.won) return;
            
            const container = $('blocks-container');
            const type = BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
            
            const box = document.createElement('a-box');
            box.setAttribute('width', '0.5');
            box.setAttribute('height', '0.5');
            box.setAttribute('depth', '0.5');
            box.setAttribute('color', type.color);
            box.setAttribute('id', 'block-' + blockCount++);
            box.setAttribute('class', 'game-block');
            box.setAttribute('shadow', '');
            
            // Random position in front of camera
            const x = (Math.random() - 0.5) * 4;
            const y = 0.5 + Math.random() * 1.5;
            const z = -2 - Math.random() * 3;
            
            box.setAttribute('position', `${x} ${y} ${z}`);
            
            // Random rotation
            box.setAttribute('rotation', `${Math.random()*30} ${Math.random()*30} ${Math.random()*30}`);
            
            container.appendChild(box);
            
            const data = { 
                el: box, 
                y: y, 
                x: x, 
                z: z,
                velY: -0.003 - Math.random() * 0.005,
                rotVelX: (Math.random() - 0.5) * 2,
                rotVelY: (Math.random() - 0.5) * 2,
                type, 
                caught: false 
            };
            state.blocks.push(data);
            
            // Click handler
            box.addEventListener('click', (e) => {
                e.stopPropagation();
                tapBlock(data, e);
            });
        }
        
        function tapBlock(data, event) {
            if (data.caught || !state.playing) return;
            data.caught = true;
            
            // Get screen position
            let sx = window.innerWidth / 2;
            let sy = window.innerHeight / 2;
            
            if (event && event.detail && event.detail.intersection) {
                const rect = document.querySelector('a-scene').getBoundingClientRect();
                sx = event.detail.intersection.point.x;
                sy = event.detail.intersection.point.y;
            }
            
            createParticles(sx, sy, data.type.color);
            playSound('pop');
            
            const now = Date.now();
            state.combo = (now - state.lastTap < 1200) ? state.combo + 1 : 1;
            state.lastTap = now;
            
            const pts = data.type.points * Math.min(state.combo, 5);
            state.score += pts;
            
            $('score').firstChild.textContent = state.score;
            
            if (state.combo >= 2) {
                $('combo').textContent = 'COMBO x' + state.combo + '!';
                $('combo').style.opacity = '1';
                setTimeout(() => $('combo').style.opacity = '0', 600);
            }
            
            // Animate out
            data.el.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 100');
            setTimeout(() => data.el.remove(), 100);
            
            if (state.score >= 10) win();
        }
        
        function gameLoop() {
            if (!state.playing || state.won) return;
            
            state.blocks = state.blocks.filter(b => {
                if (b.caught) return false;
                
                // Move down
                b.y += b.velY;
                b.el.setAttribute('position', `${b.x} ${b.y} ${b.z}`);
                
                // Rotate
                const rot = b.el.getAttribute('rotation');
                b.el.setAttribute('rotation', `${rot.x + b.rotVelX} ${rot.y + b.rotVelY} ${rot.z}`);
                
                // Remove if too low
                if (b.y < -0.5) {
                    b.el.remove();
                    return false;
                }
                return true;
            });
            
            requestAnimationFrame(gameLoop);
        }
        
        function start() {
            initAudio();
            
            state.score = 0;
            state.playing = true;
            state.won = false;
            state.blocks = [];
            state.combo = 0;
            
            $('score').firstChild.textContent = '0';
            $('score').style.display = 'block';
            $('start-screen').classList.add('hidden');
            $('status').textContent = '👆 Тапайте по блокам!';
            $('status').classList.add('ready');
            
            document.querySelectorAll('.game-block').forEach(b => b.remove());
            
            // Start spawning
            spawnBlock();
            spawnTimer = setInterval(spawnBlock, 800);
            gameLoop();
        }
        
        function win() {
            state.won = true;
            state.playing = false;
            clearInterval(spawnTimer);
            playSound('win');
            state.blocks.forEach(b => b.el.remove());
            state.blocks = [];
            
            $('final-score').textContent = state.score;
            $('win-modal').classList.add('show');
        }
        
        function reset() {
            state.won = false;
            state.playing = false;
            $('win-modal').classList.remove('show');
            $('start-screen').classList.remove('hidden');
            $('score').style.display = 'none';
            $('status').style.display = 'none';
            $('back-btn').style.display = 'none';
            $('game-scene').style.display = 'none';
        }
        
        // ============ INIT ============
        async function initCamera() {
            try {
                // Get camera stream
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                
                // Create video element for background
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;';
                document.body.appendChild(video);
                await video.play();
                
                // Hide loading, show start
                $('loading').classList.add('hidden');
                $('start-screen').classList.remove('hidden');
                state.cameraReady = true;
                
            } catch(err) {
                console.error('Camera error:', err);
                $('loading').innerHTML = `
                    <p style="color:#ff4444;font-size:16px;text-align:center;padding:20px;">
                        📷 Ошибка камеры: ${err.message}<br><br>
                        Разрешите доступ к камере и обновите страницу
                    </p>
                `;
            }
        }
        
        // Event listeners
        $('start-btn').onclick = () => {
            if (!state.cameraReady) {
                alert('Камера ещё загружается...');
                return;
            }
            
            // Show game
            $('start-screen').classList.add('hidden');
            $('status').style.display = 'block';
            $('back-btn').style.display = 'block';
            $('game-scene').style.display = 'block';
            
            // Wait for A-Frame
            setTimeout(start, 500);
        };
        
        $('play-again').onclick = reset;
        
        // Tap anywhere to catch blocks (mobile)
        $('tap-area').addEventListener('click', (e) => {
            if (!state.playing || state.won) return;
            
            // Simple: spawn a block at tap location
            const rect = e.target.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 4 - 2;
            const y = ((rect.height - e.clientY + rect.top) / rect.height) * 3;
            
            // Check if tap is near any block
            state.blocks.forEach(b => {
                if (b.caught) return;
                const blockScreenX = (b.x + 2) / 4 * window.innerWidth;
                const blockScreenY = (1 - (b.y - 0.5) / 2) * window.innerHeight;
                const dist = Math.sqrt(Math.pow(e.clientX - blockScreenX, 2) + Math.pow(e.clientY - blockScreenY, 2));
                
                if (dist < 80) {
                    tapBlock(b, null);
                }
            });
        });
        
        // Auto-init
        initCamera();
    </script>
</body>
</html>
